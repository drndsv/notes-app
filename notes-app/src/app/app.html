<tui-root>
  <div class="page">
    <h1>Notes App</h1>

    <form class="page__form" (ngSubmit)="addNote(titleModel.value ?? '', contentModel.value ?? '')">
      <div class="field">
        <div class="label">Source</div>

        <div tuiGroup class="group" [collapsed]="true">
          <label tuiBlock>
            <input
              tuiRadio
              type="radio"
              name="source"
              value="api"
              [(ngModel)]="selectedSource"
              (ngModelChange)="changeSource($event)"
            />
            API
          </label>

          <label tuiBlock>
            <input
              tuiRadio
              type="radio"
              name="source"
              value="localStorage"
              [(ngModel)]="selectedSource"
              (ngModelChange)="changeSource($event)"
            />
            LocalStorage
          </label>
        </div>
      </div>

      <div class="field">
        <label class="label" for="title">Title</label>

        <tui-textfield>
          <textarea
            id="title"
            tuiTextarea
            type="text"
            name="title"
            [(ngModel)]="title"
            #titleModel="ngModel"
            placeholder="Title"
            [limit]="50"
          ></textarea>
        </tui-textfield>
      </div>

      <div class="field">
        <label class="label" for="content">Content</label>

        <tui-textfield>
          <textarea
            id="content"
            tuiTextarea
            name="content"
            [(ngModel)]="content"
            #contentModel="ngModel"
            placeholder="Content"
            [limit]="200"
          ></textarea>
        </tui-textfield>
      </div>

      <div class="page__actions">
        <button
          tuiButton
          type="submit"
          appearance="primary"
          [disabled]="!title.trim() || !content.trim()"
        >
          Add note
        </button>
      </div>
    </form>

    <div class="notes">
      @for (note of notes; track note.id) {
        <section tuiCardLarge="compact" class="notes__card">
          <header tuiHeader="body-m">
            <hgroup tuiTitle>
              <h2>{{ note.title }}</h2>
              <p tuiSubtitle>Note</p>
            </hgroup>

            <aside>
              <span class="notes__id">ID: {{ note.id }}</span>
            </aside>
          </header>

          <div tuiCardRow>
            <div class="notes__content">
              {{ note.content }}
            </div>
          </div>
        </section>
      }
    </div>

    <router-outlet />
  </div>
</tui-root>
